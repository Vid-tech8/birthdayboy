<script>

function showMemory(image, text, music){

let popup = document.getElementById("memoryPopup")
let popupImg = document.getElementById("memoryImage")
let popupText = document.getElementById("memoryText")
let player = document.getElementById("memoryMusic")

popupImg.src = image
popupText.innerText = text
popup.style.display = "flex"

if(music){
player.src = music
player.play()
}

}

function closeMemory(){
document.getElementById("memoryPopup").style.display = "none"

let player = document.getElementById("memoryMusic")
player.pause()
player.currentTime = 0
}

function closeHint(){
document.getElementById("hintPopup").style.display="none"
}

</script>

<audio id="memoryMusic"></audio>
